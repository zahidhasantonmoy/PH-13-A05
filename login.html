<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Tracker </title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    <div class="width-80% mx-auto mt-10">
    <fieldset class="fieldset bg-base-200 border-base-300 rounded-box w-sm border p-4 mx-auto">
        <img src="./assets/github-logo.png" alt="Github Logo" class="w-16 h-16 mx-auto mb-4" />
        <h2 class="text-2xl font-bold text-center mb-4">GitHub Issues Tracker</h2>
        <p class="text-center mb-6">Sign in to manage your issues</p>
  

  <label class="label">Username</label>
  <input type="text" class="input" placeholder="Enter Username" />
  <p>Default: admin</p>

  <label class="label">Password</label>
  <input type="password" class="input" placeholder="Enter Password" />
  <p>Default: admin123</p>

  <button class="btn btn-primary">Sign In</button>
  <br>
   <div class="divider">OR</div>
   <h1 class="text-sm font-normal text-center mb-4">Demo Credentials:</h1>
  <div class="bg-base-300 p-4 mt-6 rounded-box items-center text-center">
   
    <p><strong>Username:</strong> admin</p>
    <p><strong>Password:</strong> admin123</p>
  </div>
</fieldset>
</div>
</body>
</html>
