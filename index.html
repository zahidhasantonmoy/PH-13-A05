<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body class="bg-base-200">
<nav class=" w-full navbar bg-base-100 shadow-sm">
  <div class="flex-1 flex items-center gap-2">
    <img src="./assets/github-logo.png" alt="">
    <a class="btn btn-ghost text-xl">GitHub Issues Tracker</a>
  </div>
  <div class="flex gap-2">
    <label class="input">
  <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
    <g
      stroke-linejoin="round"
      stroke-linecap="round"
      stroke-width="2.5"
      fill="none"
      stroke="currentColor"
    >
      <circle cx="11" cy="11" r="8"></circle>
      <path d="m21 21-4.3-4.3"></path>
    </g>
  </svg>
  <input type="search" required placeholder="Search issues..." />
</label>
    <button class="btn btn-primary"><i class="fa-solid fa-plus"></i>New Issue</button>
  </div>

</nav>
<section class="w-[80%] bg-base-100 shadow-xl  border-base-200 mt-7 rounded-lg p-5 mx-auto">
  <div class="flex items-center gap-3 mb-4">
    <button class="btn btn-active btn-primary">Open</button>
    <button class="btn btn-active btn-primary">Closed</button>
    <button class="btn btn-active btn-primary">All</button>
  </div>
</section>
<section class="w-[80%] bg-base-100 shadow-xl flex justify-between border-base-200 mt-7 rounded-lg p-5 mx-auto">
  <div class="flex">
  <div>
    <img src="./assets/Aperture.png" alt="">
  </div>
  <div>
    <h1 class="text-2xl font-bold">50 Issues</h1>
    <p>Track and manage your project issues</p>
  </div>
  </div>
  <div class="flex gap-4 mt-4 justify-center items-center">
    <div class="flex">
      <img src="./assets/Open-Status.png" alt="">
      <p class="font-medium text-bold">Open</p>
    </div>
    <div class="flex justify-center items-center gap-2">
      <img src="./assets/Closed- Status .png" alt="">
      <p class="font-medium text-bold">Closed</p>
      </div>
  </div>
</section>
<section>
  <div class="card w-96 bg-base-100 shadow-sm">
  <div class="card-body">
    
    <div class="flex justify-between">
      <img src="./assets/Closed- Status .png" alt="">
      <span class="badge badge-xl bg-[#EF4444]">High</span>
    </div>
  <div class="card-title">Fix navigation menu on mobile devices</div>
    <p>The navigation menu doesn't collapse properly on mobile devices...</p>
  <div class="gap-4">
     <span class="badge badge-xl bg-[#FECACA] rounded-lg"><i class="fa-solid fa-bug"></i>Bug</span>
      <span class="badge badge-xl bg-[#D97706]"><i class="fa-solid fa-question-circle"></i>help wanted</span>

  </div>
  </div>
  <div class="divider"> </div>
  <div class="card w-96 bg-base-100 shadow-sm mt-1 justify-between p-6">
    <p>  #1 by john_doe</p>
    <p>1/15/2024</p>
</div>
</section>
</body>
</html>
